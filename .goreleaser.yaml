version: 2

project_name: gethook

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    main: .

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: gethook
    repository:
      owner: gethooklabs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://gethook.dev"
    description: "Receive, debug, and replay webhooks locally — in seconds."
    license: "Apache-2.0"
    test: |
      system "#{bin}/gethook version"
    install: |
      bin.install "gethook"

nfpms:
  - id: packages
    package_name: gethook
    vendor: GetHook
    homepage: https://gethook.dev
    description: Receive, debug, and replay webhooks locally — in seconds.
    license: Apache-2.0
    formats:
      - deb
      - rpm

# scoop support removed — goreleaser v2 dropped the scoop publisher.
# Windows users can download the binary directly from GitHub Releases.
